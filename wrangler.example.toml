# wrangler.example.toml
# Copy this file to wrangler.toml and fill in real values.
# Do NOT commit wrangler.toml — it contains secrets.

name = "zencart-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Cloudflare Account ID (from your Cloudflare dashboard)
# account_id = "YOUR_ACCOUNT_ID"

# D1 Database binding
# Use the existing "hangright-db" database — do NOT create a new one.
[[d1_databases]]
binding = "DB"
database_name = "hangright-db"
database_id = "YOUR_DATABASE_ID"   # Replace with your actual D1 database ID

# Environment variables (set via `wrangler secret put` or in wrangler.toml)
# [vars]
# AMAZON_TRACKING_ID = "your-tracking-id"
# BMC_URL = "https://buymeacoffee.com/your-username"
# ALLOWED_ORIGIN = "https://sillymodes.github.io"
